<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Amazon.com: Example Product</title>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Product",
  "name": "Example Wireless Headphones Pro",
  "image": "https://m.media-amazon.com/images/I/41abc123._AC_SL1000_.jpg",
  "offers": {
    "@type": "Offer",
    "price": "24.99",
    "priceCurrency": "USD",
    "availability": "https://schema.org/InStock"
  },
  "aggregateRating": {
    "@type": "AggregateRating",
    "ratingValue": "4.5",
    "reviewCount": "1234"
  }
}
</script>
</head>
<body>
<div id="productTitle"><span id="productTitle">Example Wireless Headphones Pro</span></div>
<span class="a-price"><span class="a-offscreen">$24.99</span></span>
<i class="a-icon-star"><span class="a-icon-alt">4.5 out of 5 stars</span></i>
<span id="acrCustomerReviewText">1,234 ratings</span>
<div id="availability"><span>In Stock</span></div>
<img id="landingImage" src="https://m.media-amazon.com/images/I/41abc123._AC_SL1000_.jpg">
</body>
</html>
