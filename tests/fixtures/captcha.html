<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Robot Check</title>
</head>
<body>
<div class="a-box">
  <div class="a-box-inner">
    <h4>Enter the characters you see below</h4>
    <p>Sorry, we just need to make sure you're not a robot. For best results, please make sure your browser is accepting cookies.</p>
    <form>
      <img src="https://images-na.ssl-images-amazon.com/captcha/abc123.jpg" alt="captcha">
      <input type="text" name="field-keywords" placeholder="Type the characters you see">
      <button type="submit">Continue</button>
    </form>
  </div>
</div>
</body>
</html>
