<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Amazon.com: Graph Product</title>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "WebPage",
      "name": "Product Page"
    },
    {
      "@type": "Product",
      "name": "Graph Wireless Earbuds",
      "image": "https://m.media-amazon.com/images/I/51def456._AC_SL1000_.jpg",
      "offers": {
        "@type": "Offer",
        "price": "79.99",
        "priceCurrency": "USD",
        "availability": "https://schema.org/InStock"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.2",
        "reviewCount": "567"
      }
    }
  ]
}
</script>
</head>
<body></body>
</html>
